<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8">
<title>Aussortieren</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗑</text></svg>">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..700;1,9..144,300..700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #08090b; --panel: #0e1014; --line: #23262d;
    --txt: #ece9e2; --dim: #6f7480; --faint: #3a3e47;
    --red: #ff6257; --green: #59d98c;
    --glow: 210 90% 60%;
    --serif: "Fraunces", ui-serif, Georgia, serif;
    --mono: "IBM Plex Mono", ui-monospace, "SF Mono", monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    background: var(--bg); color: var(--txt); overflow: hidden;
    font: 14px/1.5 var(--mono);
    -webkit-font-smoothing: antialiased;
    display: flex;
  }

  /* ================= links: das Bild ================= */
  #left {
    position: relative; flex: 1; min-width: 0;
    background: #000;
  }
  #fill {
    position: absolute; inset: -6%;
    background-size: cover; background-position: center;
    filter: blur(30px) brightness(.35) saturate(1.1);
  }
  #img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: contain; z-index: 1;
  }
  #left::after {   /* feine Kante zum Panel */
    content: ""; position: absolute; inset: 0 0 0 auto; width: 1px;
    background: var(--line); z-index: 2;
  }

  /* ================= rechts: Details + Steuerung ================= */
  #right {
    width: clamp(340px, 30vw, 440px); flex: none;
    display: flex; flex-direction: column;
    padding: 34px 34px 28px;
    background:
      radial-gradient(120% 60% at 50% 0%, hsl(var(--glow) / .08), transparent 60%),
      var(--panel);
    transition: background 1s;
  }
  .mark { font: italic 300 30px/1 var(--serif); }
  .mark::after { content: "."; color: hsl(var(--glow) / .95); font-style: normal; }

  #catline {
    margin-top: 10px; font-size: 11.5px; letter-spacing: .14em;
    text-transform: uppercase; color: var(--dim);
  }
  #catline b { color: hsl(var(--glow) / .95); font-weight: 600; }

  #reasons { display: flex; flex-wrap: wrap; gap: 7px; margin-top: 22px; min-height: 26px; }
  .chip {
    font-size: 10.5px; letter-spacing: .1em; text-transform: uppercase;
    color: var(--dim); border: 1px solid var(--faint);
    border-radius: 99px; padding: 4px 11px; white-space: nowrap;
  }
  .chip.cat { color: hsl(var(--glow) / .95); border-color: hsl(var(--glow) / .45); }

  #fileinfo { margin-top: 20px; border-top: 1px solid var(--line); padding-top: 18px; }
  #fileinfo .row { display: flex; justify-content: space-between; gap: 12px;
                   font-size: 12px; padding: 4px 0; }
  #fileinfo .k { color: var(--faint); flex: none; text-transform: uppercase;
                 letter-spacing: .1em; font-size: 10.5px; padding-top: 2px; }
  #fileinfo .v { color: var(--dim); text-align: right; overflow-wrap: anywhere; }

  #spacer { flex: 1; }

  #frac { font: 300 42px/1 var(--serif); font-variant-numeric: tabular-nums; }
  #frac .total { color: var(--dim); font-size: 24px; }
  #subtally { margin-top: 8px; font-size: 12px; color: var(--dim); }
  #subtally .d { color: var(--red); } #subtally .k { color: var(--green); }
  #barwrap { margin-top: 14px; height: 3px; background: var(--line); border-radius: 3px; }
  #bar { height: 100%; width: 0%; border-radius: 3px;
         background: hsl(var(--glow) / .9); transition: width .2s, background 1s; }

  #keys { display: flex; flex-direction: column; gap: 10px; margin-top: 26px; }
  .key {
    display: flex; align-items: center; gap: 14px;
    background: #131519; border: 1px solid var(--line);
    color: var(--txt); border-radius: 12px; padding: 13px 16px;
    font: inherit; font-size: 13.5px; cursor: pointer; text-align: left;
    transition: border-color .15s;
  }
  .key:active { transform: scale(.985); }
  kbd {
    font: 600 11px/1 var(--mono); letter-spacing: .05em; color: var(--txt);
    background: #0a0b0e; border: 1px solid var(--faint); border-bottom-width: 3px;
    border-radius: 7px; padding: 7px 11px; min-width: 44px; text-align: center;
  }
  .key.del:hover  { border-color: var(--red); }   .key.del kbd  { color: var(--red); }
  .key.keep:hover { border-color: var(--green); } .key.keep kbd { color: var(--green); }
  .key.undo:hover { border-color: var(--faint); }
  .key[disabled]  { opacity: .35; cursor: default; }
  .key .lbl { flex: 1; }
  .key .hint { color: var(--faint); font-size: 11px; }

  /* ================= Ende / Laden / Toast ================= */
  #done, #loading {
    position: absolute; inset: 0; z-index: 3;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 14px; text-align: center;
    background: var(--bg);
  }
  #loading { color: var(--dim); font-size: 12px; letter-spacing: .14em; text-transform: uppercase; }
  #done { display: none; }
  #done h2 { font: italic 300 52px/1.1 var(--serif); }
  #done .nums { font: 300 19px/1.5 var(--serif); color: var(--dim); }
  #done .nums b.d { color: var(--red); } #done .nums b.k { color: var(--green); }
  #done p { color: var(--dim); font-size: 12px; max-width: 400px; line-height: 1.7; }
  .toast {
    position: fixed; top: 22px; left: 50%; transform: translateX(-50%);
    background: #131519; border: 1px solid var(--line);
    border-radius: 10px; padding: 10px 18px; font-size: 12.5px; z-index: 30;
    opacity: 0; transition: opacity .2s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<div id="left">
  <div id="fill"></div>
  <img id="img" alt="">
</div>

<div id="right">
  <div class="mark">Aussortieren</div>
  <div id="catline"></div>
  <div id="reasons"></div>
  <div id="fileinfo"></div>
  <div id="spacer"></div>
  <div id="frac"></div>
  <div id="subtally"></div>
  <div id="barwrap"><div id="bar"></div></div>
  <div id="keys">
    <button class="key del"  id="btnDel"  tabindex="-1">
      <kbd>⌫</kbd><span class="lbl">Löschen</span><span class="hint">Papierkorb</span></button>
    <button class="key keep" id="btnKeep" tabindex="-1">
      <kbd>⏎</kbd><span class="lbl">Behalten</span></button>
    <button class="key undo" id="btnUndo" tabindex="-1" disabled>
      <kbd>U</kbd><span class="lbl">Rückgängig</span></button>
  </div>
</div>

<div id="loading">Lade Kandidaten …</div>
<div id="done">
  <h2>Fertig.</h2>
  <div class="nums" id="doneStats"></div>
  <p>Gelöschte liegen im <b>Papierkorb</b> der Fotos-App — endgültig weg
     sind sie erst, wenn du ihn dort leerst.</p>
</div>
<div class="toast" id="toast"></div>

<script>
const ATLAS = "http://atlas.your-tailnet.ts.net:8788";
const CATS  = { screenshot: "Screenshot", dark: "Leer / Schwarz", blurry: "Unscharf", doc: "Dokument" };
const HUES  = { screenshot: "210 90% 60%", dark: "268 70% 65%", blurry: "38 95% 60%", doc: "160 70% 55%" };

let all = [], queue = [], cur = null;
let decided = {};        // Serverstand: id -> "del"|"keep"
let history = [];        // Undo, nur diese Sitzung
let busy = false;

const $ = id => document.getElementById(id);
const thumb = (id, s) => `${ATLAS}/api/assets/${id}/thumb/${s}?v=2`;

Promise.all([
  fetch("candidates.json").then(r => r.json()),
  fetch("/state").then(r => r.json()),
]).then(([list, state]) => {
  all = list;
  decided = state.decided || {};
  queue = all.filter(c => !decided[c.id]);
  $("loading").style.display = "none";
  render();
}).catch(e => { $("loading").textContent = "⚠️ " + e.message; });

function counts() {
  let del = 0, keep = 0;
  for (const a of all) {
    if (decided[a.id] === "del") del++;
    else if (decided[a.id] === "keep") keep++;
  }
  return { del, keep, done: del + keep, total: all.length };
}

function render() {
  const c = counts();
  $("bar").style.width = (c.total ? 100 * c.done / c.total : 0) + "%";
  $("frac").innerHTML =
    `${c.done}&hairsp;<span class="total">/&hairsp;${c.total.toLocaleString("de-DE")}</span>`;
  $("subtally").innerHTML =
    `<span class="d">${c.del} gelöscht</span> · <span class="k">${c.keep} behalten</span>`;
  $("btnUndo").disabled = history.length === 0;

  cur = queue[0] || null;
  if (!cur) {
    $("done").style.display = "flex";
    $("doneStats").innerHTML =
      `<b class="d">${c.del}</b> in den Papierkorb · <b class="k">${c.keep}</b> behalten`;
    return;
  }
  $("done").style.display = "none";

  document.documentElement.style.setProperty("--glow", HUES[cur.cat]);
  const inCat = all.filter(a => a.cat === cur.cat);
  const doneCat = inCat.filter(a => decided[a.id]).length;
  $("catline").innerHTML = `<b>${CATS[cur.cat]}</b> · ${doneCat} / ${inCat.length}`;
  $("reasons").innerHTML =
    `<span class="chip cat">${CATS[cur.cat]}</span>` +
    cur.reasons.map(r => `<span class="chip">${r}</span>`).join("");
  $("fileinfo").innerHTML = [
    ["Datei", cur.name || cur.id.slice(0, 14)],
    ["Datum", cur.day || "—"],
    ["Maße", cur.w && cur.h ? `${cur.w} × ${cur.h}` : "—"],
  ].map(([k, v]) => `<div class="row"><span class="k">${k}</span><span class="v">${v}</span></div>`).join("");

  // Bild: 512 sofort (Cache), 2048 sobald da — ohne Animationen
  const img = $("img");
  img.src = thumb(cur.id, 512);
  $("fill").style.backgroundImage = `url("${thumb(cur.id, 512)}")`;
  const hi = new Image();
  hi.onload = () => { if (cur && hi.dataset.id === cur.id) img.src = hi.src; };
  hi.dataset.id = cur.id;
  hi.src = thumb(cur.id, 2048);
  for (const nxt of queue.slice(1, 4)) new Image().src = thumb(nxt.id, 2048);
}

async function send(id, action) {
  const r = await fetch("/decide", { method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ id, action }) });
  if (!r.ok) throw new Error("Server " + r.status);
}

async function decide(action) {
  if (!cur || busy) return;
  busy = true;
  const item = cur;
  try {
    await send(item.id, action);
    decided[item.id] = action;
    history.push(item);
    queue.shift();
    render();                       // direkt das naechste Bild, kein Theater
  } catch (e) {
    toast("⚠️ " + e.message + " — nichts geändert");
  } finally { busy = false; }
}

async function undo() {
  if (!history.length || busy) return;
  busy = true;
  const item = history.pop();
  try {
    await send(item.id, "undo");
    delete decided[item.id];
    queue.unshift(item);
    toast("↩︎ zurückgeholt");
    render();
  } catch (e) {
    history.push(item);
    toast("⚠️ " + e.message);
  } finally { busy = false; }
}

let toastT;
function toast(msg) {
  const t = $("toast");
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastT);
  toastT = setTimeout(() => t.classList.remove("show"), 2200);
}

document.addEventListener("keydown", e => {
  if (e.repeat || e.metaKey || e.ctrlKey || e.altKey) return;
  if (e.code === "Backspace" || e.code === "Delete") { e.preventDefault(); decide("del"); }
  else if (e.code === "Enter") { e.preventDefault(); decide("keep"); }
  else if (e.code === "KeyU")  { e.preventDefault(); undo(); }
});
$("btnDel").onclick  = () => decide("del");
$("btnKeep").onclick = () => decide("keep");
$("btnUndo").onclick = undo;
</script>
</body>
</html>
