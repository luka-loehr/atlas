name: AtlasPhotos
options:
  bundleIdPrefix: com.lukaloehr
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    GENERATE_INFOPLIST_FILE: NO

targets:
  AtlasPhotos:
    type: application
    platform: iOS
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Atlas Fotos
        UILaunchScreen: {}
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        ITSAppUsesNonExemptEncryption: false
        UIBackgroundModes:
          - processing
        BGTaskSchedulerPermittedIdentifiers:
          - com.lukaloehr.AtlasPhotos.backup
        NSFaceIDUsageDescription: Face ID schützt deinen gesperrten Ordner.
        NSPhotoLibraryUsageDescription: Atlas Fotos sichert deine Aufnahmen auf deinem atlas-Server und räumt gesicherte Fotos vom iPhone.
        NSPhotoLibraryAddUsageDescription: Atlas Fotos kann Originale zurück in deine iPhone-Mediathek legen.
        NSAppTransportSecurity:
          NSExceptionDomains:
            ts.net:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lukaloehr.AtlasPhotos
        CODE_SIGNING_ALLOWED: NO
