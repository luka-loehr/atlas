# atlas-photos pipeline — CPU + GPU workers, autostart on boot.
# Host paths are configurable via a .env file next to this compose file
# (copy .env.example -> .env). Run from this directory:
#   docker compose up -d --build
# Autostart: restart: unless-stopped + enabled docker daemon => power button is all.
name: atlas-pipeline

x-pipeline-common: &pipeline-common
  restart: unless-stopped
  network_mode: host
  environment:
    PHOTOS_DIR: /photos
    MODELS_DIR: /models
    HF_HOME: /models/hf
    PG_ENV_FILE: /secrets/.env
    # git revision of the Qwen embedding repo — its bundled code is executed,
    # pin a commit sha for supply-chain safety (see .env.example)
    ATLAS_EMBED_REVISION: ${ATLAS_EMBED_REVISION:-main}
  volumes:
    - ${ATLAS_PHOTOS_DIR:-/srv/atlas/photos}:/photos
    - ${ATLAS_MODELS_DIR:-/srv/atlas/models}:/models
    - ${ATLAS_PG_ENV_FILE:-../../../backend/docker/.env}:/secrets/.env:ro
    # Source is mounted, not baked in: git pull + docker compose restart = new code.
    - .:/app:ro

services:
  pipeline-cpu:
    # write thumbs as the library-owning host user so host tools may touch them
    user: "${ATLAS_PIPELINE_UID:-1000}:${ATLAS_PIPELINE_GID:-1000}"
    <<: *pipeline-common
    build:
      context: .
      dockerfile: Dockerfile.cpu
    image: atlas-pipeline-cpu

  # Qwen3-VL-Embedding-2B Text-Embeddings fuer die semantische Suche. Nutzt das GPU-Image
  # (torch+transformers sind da schon drin), aber OHNE GPU-Reservierung —
  # torch laeuft dann auf CPU. Lauscht nur auf 127.0.0.1:8093 (Rust-Server).
  embed-api:
    <<: *pipeline-common
    image: atlas-pipeline-gpu
    entrypoint: ["python3", "/app/embed_api.py"]

  pipeline-gpu:
    <<: *pipeline-common
    build:
      context: .
      dockerfile: Dockerfile.gpu
    image: atlas-pipeline-gpu
    # torch/vLLM want a big shared-memory segment
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
