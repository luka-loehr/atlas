name: AtlasCommandCenter
options:
  bundleIdPrefix: com.lukaloehr
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true

packages:
  SwiftTerm:
    url: https://github.com/migueldeicaza/SwiftTerm
    from: "1.2.0"

settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    GENERATE_INFOPLIST_FILE: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  AtlasCommandCenter:
    type: application
    platform: iOS
    dependencies:
      - package: SwiftTerm
    sources:
      - path: Sources
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: Atlas
        UILaunchScreen: {}
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIUserInterfaceStyle: Dark
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
        NSFaceIDUsageDescription: Face ID schützt den Terminal-Zugriff auf atlas.
        NSAppTransportSecurity:
          NSExceptionDomains:
            ts.net:
              NSIncludesSubdomains: true
              NSExceptionAllowsInsecureHTTPLoads: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.lukaloehr.AtlasCommandCenter
        CODE_SIGNING_ALLOWED: NO
