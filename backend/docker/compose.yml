services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: atlas-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: atlas
      POSTGRES_USER: atlas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set in .env}
    ports:
      - "127.0.0.1:5432:5432"   # localhost only — remote dev via `atlas` ssh tunnel
    volumes:
      - pgdata:/var/lib/postgresql/data
    shm_size: 1g                 # HNSW index builds like real shared memory
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atlas -d atlas"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
